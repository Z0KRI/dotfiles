###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Spotlight
bind = $mainMod, space, exec, $menu

# System fundamentals
bind = SUPER, Q, exec, ~/.config/hypr/mac-style/scripts/close_window.sh
bind = SUPER, M, exec, ~/.config/hypr/mac-style/scripts/minimize_window.sh
bind = CONTROL_SUPER, F, exec, ~/.config/hypr/mac-style/scripts/maximize_window.sh
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, Q, exit,
bind = CONTROL_SUPER, Q, exec, hyprlock
bind = $mainMod, return, exec, $terminal

# Moving between workspaces
bind = CONTROL, left, workspace, m-1
bind = CONTROL, right, workspace, m+1


# Captura de pantalla completa
bind = SUPER_SHIFT, 3, exec, hyprshot -m output
# Captura de región
bind = SUPER_SHIFT, S, exec, hyprshot -m region