###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Spotlight
bind = $mainMod, space, exec, $menu

# System fundamentals
bind = SUPER, Q, exec, ~/.config/hypr/mac-style/scripts/close_window.sh
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, return, exec, $terminal

# Moving between workspaces
bind = CONTROL, left, workspace, m-1
bind = CONTROL, right, workspace, m+1

# Mueve la ventana activa a un nuevo espacio vacío y cambia a él (Como el Fullscreen de Mac)
bind = SUPER, M, movetoworkspace, empty
# Una vez ahí, puedes hacerla fullscreen si quieres que ocupe todo sin bordes
bind = SUPER, M, fullscreen, 0